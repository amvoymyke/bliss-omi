<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss - Preloaded Memory</title>
</head>
<body>

<elevenlabs-convaiagent-id="agent_6701kkngterke10twqsqn7p3ttyk"
  id="widget"
></elevenlabs-convai>

<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async></script>

<script>
const MAKE_URL = 'https://hook.us2.make.com/z1h1854kjti6dan3a3f1qlysevfzcgvt';
let memoryLoaded = false;

// Wait for widget to be ready
function waitForWidget() {
  return new Promise((resolve) => {
    const widget = document.getElementById('widget');
    const checkReady = setInterval(() => {
      if (widget && widget.startConversation) {
        clearInterval(checkReady);
        resolve(widget);
      }
    }, 100);
  });
}

// Preload memory from webhook
async function preloadMemory() {
  try {
    const response = await fetch(MAKE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_memory' })
    });
    
    const text = await response.text();
    const data = JSON.parse(text);
    
    if (data?.dynamic_variables?.groomed_memory) {
      const widget = await waitForWidget();
      
      // Set dynamic variables BEFORE conversation starts
      widget.setAttribute('dynamic-variables', JSON.stringify({
        groomed_memory: data.dynamic_variables.groomed_memory
      }));
      
      memoryLoaded = true;
      console.log('✅ Memory preloaded successfully');
    }
  } catch (error) {
    console.error('Failed to preload memory:', error);// Continue without memory rather than blocking
  }
}

// Initialize when page loads
window.addEventListener('load', () => {
  preloadMemory();
});
</script>

</body>
</html>
