<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bliss</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&display=swap');
  :root { --bg:#0a0a0f; --accent:#7b6ef6; --text:#e8e6f0; --dim:#6b6880; --ok:#6ef6b8; --err:#f66e7b; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; }
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; }
  .amb { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .amb::before {
    content:''; position:absolute; width:500px; height:500px; border-radius:50%;
    background:radial-gradient(circle,rgba(123,110,246,.1) 0%,transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    animation:breathe 6s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6} 50%{transform:translate(-50%,-50%) scale(1.2);opacity:1} }
  .wrap { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:48px; padding:40px 24px; width:100%; max-width:380px; }
  .title { font-family:'DM Serif Display',serif; font-size:56px; background:linear-gradient(135deg,#e8e6f0 30%,#7b6ef6 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-align:center; line-height:1; margin-bottom:6px; }
  .sub { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); text-align:center; }
  .orb-w { position:relative; width:180px; height:180px; cursor:pointer; user-select:none; }
  .ring { position:absolute; border-radius:50%; border:1px solid transparent; animation:ri 3s ease-in-out infinite; }
  .r1{inset:-20px;border-color:rgba(123,110,246,.6);animation-delay:0s;opacity:0}
  .r2{inset:-40px;border-color:rgba(123,110,246,.3);animation-delay:.5s;opacity:0}
  .r3{inset:-60px;border-color:rgba(123,110,246,.1);animation-delay:1s;opacity:0}
  @keyframes ri{0%,100%{transform:scale(.95);opacity:0}50%{transform:scale(1);opacity:1}}
  .orb { position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(200,190,255,.9) 0%,rgba(123,110,246,.85) 40%,rgba(55,45,130,.9) 70%,rgba(18,15,45,1) 100%); box-shadow:0 0 40px rgba(123,110,246,.4),0 0 80px rgba(123,110,246,.2); transition:all .3s; display:flex; align-items:center; justify-content:center; }
  .orb svg { width:48px; height:48px; filter:drop-shadow(0 0 8px rgba(255,255,255,.5)); }
  .orb-w:active .orb{transform:scale(.94)}
  .orb-w.on .r1,.orb-w.on .r2,.orb-w.on .r3{animation:ron 1.5s ease-in-out infinite}
  .orb-w.on .r2{animation-delay:.3s} .orb-w.on .r3{animation-delay:.6s}
  @keyframes ron{0%{transform:scale(.9);opacity:0}50%{transform:scale(1.05);opacity:1}100%{transform:scale(1.2);opacity:0}}
  .orb-w.sp .orb{animation:osp .8s ease-in-out infinite alternate}
  @keyframes osp{from{box-shadow:0 0 40px rgba(123,110,246,.4),0 0 80px rgba(123,110,246,.2)}to{box-shadow:0 0 70px rgba(123,110,246,.8),0 0 130px rgba(123,110,246,.4)}}
  .status{display:flex;flex-direction:column;align-items:center;gap:8px;min-height:64px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--dim);transition:all .3s}
  .dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:dp 1s ease-in-out infinite}
  .dot.sp{background:var(--ok);box-shadow:0 0 8px var(--ok);animation:dp .6s ease-in-out infinite}
  .dot.er{background:var(--err)}
  @keyframes dp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.6}}
  .st{font-size:13px;letter-spacing:1px;color:var(--dim);transition:all .3s}
  .st.on{color:var(--accent)} .st.er{color:var(--err)}
  .bar{width:120px;height:1px;background:#1a1a2e;border-radius:1px;overflow:hidden;opacity:0;transition:opacity .3s}
  .bar.on{opacity:1}
  .bf{height:100%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sw 1.5s ease-in-out infinite}
  @keyframes sw{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:4px 10px;border:1px solid rgba(123,110,246,.15);border-radius:20px;opacity:0;transition:all .5s}
  .badge.on{opacity:1;color:var(--accent);border-color:rgba(123,110,246,.4)}
  .bd{width:4px;height:4px;border-radius:50%;background:currentColor}
  .footer{position:fixed;bottom:24px;font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;opacity:.35}
</style>
</head>
<body>
<div class="amb"></div>
<div class="wrap">
  <div>
    <div class="title">Bliss</div>
    <div class="sub">Personal Assistant</div>
  </div>
  <div class="orb-w" id="orb" onclick="toggleCall()">
    <div class="ring r3"></div><div class="ring r2"></div><div class="ring r1"></div>
    <div class="orb">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="white"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="19" x2="12" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="23" x2="16" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <div class="st"  id="st">tap to speak</div>
    <div class="bar" id="bar"><div class="bf"></div></div>
    <div class="badge" id="badge"><div class="bd"></div>memory loaded</div>
  </div>
</div>
<div class="footer">Dr. Michael Albin · Bliss 3.0</div>

<script>
// ── Config ──
const AGENT_ID = 'agent_6701kkngterke10twqsqn7p3ttyk';
const MAKE_URL = 'https://hook.us2.make.com/z1h1854kjti6dan3a3f1qlysevfzcgvt';

const orbEl  = document.getElementById('orb');
const dotEl  = document.getElementById('dot');
const stEl   = document.getElementById('st');
const barEl  = document.getElementById('bar');
const badge  = document.getElementById('badge');

let conv   = null;
let memory = '';

const setS = (t, c='') => { stEl.className='st'+(c?' '+c:''); stEl.textContent=t; dotEl.className='dot'+(c?' '+c:''); };
const setB = v => barEl.className='bar'+(v?' on':'');

// ── Load memory — returns plain text from Make.com ──
async function loadMemory() {
  setS('loading memory...');
  setB(true);
  try {
    const r = await fetch(MAKE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_memory' })
    });
    const text = await r.text();
    // Try JSON first
    try {
      const d = JSON.parse(text);
      if (d?.dynamic_variables?.groomed_memory) {
        memory = d.dynamic_variables.groomed_memory;
        badge.className = 'badge on';
      }
    } catch(_) {
      // If JSON fails, use raw text directly as memory
      if (text && text.length > 10) {
        memory = text;
        badge.className = 'badge on';
        console.log('Using raw text as memory');
      }
    }
  } catch(e) {
    console.warn('Memory fetch failed:', e);
  }
  setB(false);
  setS('tap to speak');
}

// ── Toggle call ──
window.toggleCall = async function() {
  if (conv) {
    await conv.endSession();
    conv = null;
    return;
  }

  setS('connecting...', 'on');
  setB(true);
  orbEl.classList.add('on');

  // Request mic first
  try {
    await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    setS('microphone denied', 'er');
    setB(false);
    orbEl.classList.remove('on');
    return;
  }

  try {
    // Dynamically import the ElevenLabs client
    const { Conversation } = await import('https://unpkg.com/@elevenlabs/client@latest/dist/index.mjs');

    const overrides = memory ? {
      agent: {
        prompt: {
          prompt: `You are Bliss, a personal AI assistant to Dr. Michael Albin MD, a surgeon at Hernia Center of Southern California in Pasadena CA (herniaonline.com). Speak naturally — no markdown, no asterisks, no bullet points. Be warm, efficient, and calm. Keep responses short and punchy.\n\nHere is your recent conversation history:\n\n${memory}\n\nUse this context to maintain continuity. Reference previous topics when relevant.`
        }
      }
    } : {};

    conv = await Conversation.startSession({
      agentId: AGENT_ID,
      overrides,
      onConnect: () => {
        setB(false);
        setS('listening...', 'on');
      },
      onDisconnect: () => {
        conv = null;
        setS('tap to speak');
        orbEl.classList.remove('on', 'sp');
        dotEl.className = 'dot';
      },
      onModeChange: ({ mode }) => {
        if (mode === 'speaking') {
          setS('bliss is speaking...', 'on');
          orbEl.classList.add('sp');
          dotEl.className = 'dot sp';
        } else {
          setS('listening...', 'on');
          orbEl.classList.remove('sp');
          dotEl.className = 'dot on';
        }
      },
      onError: (msg) => {
        console.error('Error:', msg);
        setS('error — tap to retry', 'er');
        setB(false);
        orbEl.classList.remove('on', 'sp');
        conv = null;
      }
    });
  } catch(e) {
    console.error('Failed:', e);
    setS('failed — tap to retry', 'er');
    setB(false);
    orbEl.classList.remove('on', 'sp');
    conv = null;
  }
};

loadMemory();
</script>
</body>
</html>
